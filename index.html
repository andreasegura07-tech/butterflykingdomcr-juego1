
<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Butterfly Kingdom – Juego</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#2e7d32">
<meta name="apple-mobile-web-app-capable" content="yes">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Nunito',sans-serif;
background:linear-gradient(135deg,#e8f5e9,#e3f2fd);
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
background:linear-gradient(135deg,#1b5e20,#0d47a1);
color:white;
text-align:center;
padding:12px;
font-family:'Fredoka One';
font-size:1.3rem;
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:12px;
}

/* CARD */

.card{

background:white;
border-radius:20px;
padding:18px;

max-width:420px;
width:100%;

box-shadow:0 10px 40px rgba(0,0,0,0.25);

display:flex;
flex-direction:column;
gap:12px;

text-align:center;

}

h2{
font-family:'Fredoka One';
color:#2e7d32;
}

/* PREVIEW */

.preview{
display:flex;
justify-content:center;
gap:10px;
}

.preview img{

width:60px;
height:60px;

border-radius:50%;
border:4px solid #4caf50;

object-fit:cover;

}

/* RULES */

.rules{
background:#e3f2fd;
border-radius:12px;
padding:10px;
font-size:0.85rem;
text-align:left;
}

.rules ul{
list-style:none;
display:flex;
flex-direction:column;
gap:5px;
}

/* BUTTON */

button{

background:linear-gradient(135deg,#4caf50,#1b5e20);

border:none;

padding:12px;

border-radius:40px;

color:white;

font-family:'Fredoka One';

font-size:1rem;

cursor:pointer;

}

/* GAME */

.game{
display:none;
flex-direction:column;
align-items:center;
gap:12px;
}

.image{

width:90vw;
max-width:360px;

height:220px;

border-radius:16px;

overflow:hidden;

box-shadow:0 8px 30px rgba(0,0,0,0.3);

}

.image img{
width:100%;
height:100%;
object-fit:cover;
}

.options{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

width:90vw;
max-width:360px;

}

.opt{

padding:10px;

border-radius:12px;

border:2px solid #4caf50;

background:white;

font-weight:700;

cursor:pointer;

}

.opt:hover{
background:#e8f5e9;
}

.score{
font-weight:800;
color:#2e7d32;
}

</style>

</head>

<body>

<header>
🦋 Butterfly Kingdom
</header>

<main>

<div class="card" id="start">

<h2>Adivina la Mariposa</h2>

<p>¿Reconoces estas mariposas de Costa Rica?</p>

<div class="preview">

<img src="https://upload.wikimedia.org/wikipedia/commons/1/10/Morpho_menelaus.jpg">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4c/Monarch_Butterfly.jpg">
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Greta_oto.jpg">

</div>

<div class="rules">

<ul>
<li>🖼️ Se muestra una mariposa</li>
<li>✅ Adivina su nombre</li>
<li>🔥 Gana puntos</li>
</ul>

</div>

<button onclick="startGame()">Empezar</button>

</div>

<div class="game" id="game">

<div class="score">
Puntos: <span id="score">0</span>
</div>

<div class="image">
<img id="butterfly">
</div>

<div class="options" id="options"></div>

</div>

</main>

<script>

const butterflies=[

{
name:"Morpho Azul",
img:"https://upload.wikimedia.org/wikipedia/commons/1/10/Morpho_menelaus.jpg"
},

{
name:"Monarca",
img:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Monarch_Butterfly.jpg"
},

{
name:"Mariposa Cristal",
img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Greta_oto.jpg"
}

]

let score=0

function startGame(){

document.getElementById("start").style.display="none"
document.getElementById("game").style.display="flex"

next()

}

function next(){

const b=butterflies[Math.floor(Math.random()*butterflies.length)]

document.getElementById("butterfly").src=b.img

const options=document.getElementById("options")

options.innerHTML=""

butterflies.forEach(o=>{

const btn=document.createElement("button")

btn.className="opt"

btn.innerText=o.name

btn.onclick=()=>{

if(o.name===b.name){

score+=10

}else{

score-=5

}

document.getElementById("score").innerText=score

next()

}

options.appendChild(btn)

})

}

if('serviceWorker' in navigator){

navigator.serviceWorker.register('service-worker.js')

}

</script>

</body>
</html>
```
